<div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between ">

  <!-- Title -->
  <div>
    <h1 class="text-2xl font-bold" style="color: var(--text); font-family: var(--font-display);">
      Users
    </h1>
    <p class="text-sm mt-0.5" style="color: var(--muted);">
      Manage platform accounts
    </p>
  </div>

  <!-- Search -->
  <div class="flex items-center gap-2 rounded-xl px-4 py-2.5 border w-72"
       style="background: var(--surface); border-color: var(--border);">

    <app-magnifying-glass-icon></app-magnifying-glass-icon>
    
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearch()"
      placeholder="Search users..."
      class="bg-transparent text-sm outline-none w-full"
      style="color: var(--text);"
    />
  </div>

</div>
