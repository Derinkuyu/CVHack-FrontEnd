@if (open()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background: rgba(0, 0, 0, 0.5)"
    (click)="cancelled.emit()"
  >
    <div
      class="rounded-2xl border p-6 w-full max-w-sm"
      style="background: var(--surface); border-color: var(--border); box-shadow: var(--shadow)"
      (click)="$event.stopPropagation()"
    >
      <h3
        class="text-lg font-bold  mb-2"
        style="color: var(--text); font-family: var(--font-display)"
      >
        {{ title() }}
      </h3>
      <p class="text-sm mb-6" style="color: var(--muted)">{{ message() }}</p>
      <div class="flex gap-3 justify-end">
        <button
          (click)="cancelled.emit()"
          class="py-2.5 px-4 rounded-xl text-sm font-semibold border"
          style="background: var(--surface); border-color: var(--border2); color: var(--text)"
        >
          Cancel
        </button>
        <button
          (click)="confirmed.emit()"
          class="py-2.5 px-4 rounded-xl text-sm font-semibold border"
          style="background: var(--teal); border-color: var(--border2); color: var(--white)"
        >
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
