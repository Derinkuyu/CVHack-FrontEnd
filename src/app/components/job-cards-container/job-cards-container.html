<div class="flex flex-col gap-4 px-4 py-1 h-full min-h-0">
  <div class="flex items-center justify-between shrink-0">
    <!-- Left: Title + subtitle -->
    <div>
      <h2 class="text-xl font-bold" style="color: var(--text); font-family: var(--font-display)">
        Recommended jobs
      </h2>
      <p class="text-sm mt-0.5" style="color: var(--copper)">
        {{ sortedJobs.length }} roles
        <span style="color: var(--muted)">· sorted by {{ selectedSort }}</span>
      </p>
    </div>

    <!-- Right: Sort dropdown -->
    <select
      [(ngModel)]="selectedSort"
      class="text-sm px-4 py-2 rounded-xl border outline-none cursor-pointer"
      style="background: var(--surface); border-color: var(--border2); color: var(--text)"
    >
      @for (opt of sortOptions; track opt) {
        <option [value]="opt">{{ opt }}</option>
      }
    </select>
  </div>

  <!-- show job cards -->
  <div class="flex flex-col gap-4 flex-1 min-h-0 overflow-y-auto scroll-area pr-2 ">
    @for (job of sortedJobs; track job.id) {
      <app-job-card [job]="job" />
    }
  </div>
</div>
