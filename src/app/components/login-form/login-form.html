<form (ngSubmit)="onSubmit()">

  <!-- Email -->
  <div class="mb-4">
    <label class="block text-sm font-semibold mb-1.5" style="color: var(--text);">Email</label>
    <div class="flex items-center gap-2 rounded-xl px-4 py-3 border"
         style="background: var(--surface2); border-color: var(--border2);">
      <app-mail-icon></app-mail-icon>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="you@example.com"
        class="bg-transparent text-sm outline-none w-full"
        style="color: var(--text);"
      />
    </div>
  </div>

  <!-- Password -->
  <div class="mb-2">
    <label class="block text-sm font-semibold mb-1.5" style="color: var(--text);">Password</label>
    <div class="flex items-center gap-2 rounded-xl px-4 py-3 border"
         style="background: var(--surface2); border-color: var(--border2);">
      <app-lock-icon></app-lock-icon>
      <input
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        name="password"
        placeholder="••••••••"
        class="bg-transparent text-sm outline-none w-full"
        style="color: var(--text);"
      />
      <button type="button" (click)="togglePassword()" class="shrink-0" style="color: var(--faint);">
        <app-eye-icon></app-eye-icon>
      </button>
    </div>
  </div>

  <!-- Forgot password -->
  <div class="text-right mb-5">
    <a routerLink="/forgot-password" class="text-sm font-medium no-underline" style="color: var(--copper);">
      Forgot password?
    </a>
  </div>

  <!-- Submit -->
  <button type="submit"
          class="w-full py-3.5 rounded-xl text-sm font-semibold mb-5"
          style="background: var(--teal); color: var(--white);">
    Log in
  </button>

  <!-- Divider -->
  <div class="flex items-center gap-3 mb-5">
    <div class="flex-1 border-t" style="border-color: var(--border);"></div>
    <span class="text-xs" style="color: var(--muted);">New to CVHack?</span>
    <div class="flex-1 border-t" style="border-color: var(--border);"></div>
  </div>

  <!-- Create account -->
  <a routerLink="/register"
     class="block w-full text-center py-3.5 rounded-xl text-sm font-semibold border no-underline"
     style="background: var(--surface); border-color: var(--border2); color: var(--text);">
    Create an account
  </a>

</form>
