<div class="rounded-2xl p-6 border" style="background: var(--surface); border-color: var(--border); box-shadow: var(--shadow);">

  <h2 class="text-lg font-bold m-0 mb-3" style="color: var(--text); font-family: var(--font-display);">
    About the role
  </h2>

  <p class="text-sm leading-relaxed m-0" style="color: var(--muted); font-family: var(--font-body);">
    {{ data.description }}
  </p>

  <!-- What you'll do -->
  <h3 class="text-sm font-bold mt-6 mb-3" style="color: var(--text); font-family: var(--font-display);">
    What you'll do
  </h3>
  <ul class="m-0 p-0 flex flex-col gap-2">
    @for (item of data.responsibilities; track item) {
      <li class="flex items-start gap-2 text-sm" style="color: var(--muted); font-family: var(--font-body);">
        <span style="color: var(--green);">✓</span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>

  <!-- What we're looking for -->
  <h3 class="text-sm font-bold mt-6 mb-3" style="color: var(--text); font-family: var(--font-display);">
    What we're looking for
  </h3>
  <ul class="m-0 p-0 flex flex-col gap-2">
    @for (item of data.requirements; track item) {
      <li class="flex items-start gap-2 text-sm" style="color: var(--muted); font-family: var(--font-body);">
        <span style="color: var(--copper);">•</span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>

</div>
