<div class="ticket-form-card">
  <h3 class="ticket-form-card__title">Submit a ticket</h3>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="form-label">Subject</label>
      <input
        type="text"
        class="form-input"
        placeholder="Brief summary of your issue"
        [(ngModel)]="subject"
        name="subject"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" [(ngModel)]="category" name="category">
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea
        class="form-textarea"
        placeholder="Tell us what's happening, and what you expected..."
        [(ngModel)]="description"
        name="description"
      ></textarea>
    </div>

    <button type="submit" class="ticket-form-card__submit-btn">
      ➤ Submit ticket
    </button>
  </form>
</div>
