<div class="experience-card">
  <div class="experience-card__header">
    <h3 class="experience-card__title">Experience</h3>
    <button class="experience-card__add-btn" (click)="openAddForm()">+ Add</button>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" style="color: var(--muted); font-size: 14px; padding: 12px 0;">
    Loading...
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading && experienceList.length === 0 && !showForm"
    style="color: var(--muted); font-size: 14px; padding: 12px 0;">
    No experience added yet.
  </div>

  <!-- List -->
  <div class="experience-card__list" *ngIf="!isLoading && experienceList.length > 0">
    <div class="experience-item" *ngFor="let item of experienceList">
      <div class="experience-item__icon">💼</div>

      <div class="experience-item__info">
        <h4 class="experience-item__title">{{ item.title }}</h4>
        <p class="experience-item__meta">
          {{ item.company }} · {{ item.startDate }} — {{ item.endDate }}
        </p>
        <p class="experience-item__description">{{ item.description }}</p>
      </div>

      <div class="experience-item__actions">
        <button class="experience-item__edit" (click)="openEditForm(item)">✏</button>
        <button class="experience-item__delete" (click)="deleteExperience(item.id!)">🗑</button>
      </div>
    </div>
  </div>

  <!-- Form -->
  <div class="experience-form" *ngIf="showForm">
    <h4 class="experience-form__title">
      {{ editingId ? 'Edit Experience' : 'Add Experience' }}
    </h4>

    <div class="experience-form__grid">
      <div class="experience-form__field">
        <label class="experience-form__label">Job Title *</label>
        <input class="experience-form__input" type="text"
          [(ngModel)]="formData.title" placeholder="Senior Developer" />
      </div>

      <div class="experience-form__field">
        <label class="experience-form__label">Company *</label>
        <input class="experience-form__input" type="text"
          [(ngModel)]="formData.company" placeholder="Company Name" />
      </div>

      <div class="experience-form__field">
        <label class="experience-form__label">Start Date</label>
        <input class="experience-form__input" type="text"
          [(ngModel)]="formData.startDate" placeholder="2020" />
      </div>

      <div class="experience-form__field">
        <label class="experience-form__label">End Date</label>
        <input class="experience-form__input" type="text"
          [(ngModel)]="formData.endDate" placeholder="2023 or Present" />
      </div>
    </div>

    <div class="experience-form__field">
      <label class="experience-form__label">Description</label>
      <textarea class="experience-form__textarea"
        [(ngModel)]="formData.description"
        placeholder="Describe your role and responsibilities..."></textarea>
    </div>

    <div class="experience-form__buttons">
      <button class="experience-form__cancel" (click)="onCancel()">Cancel</button>
      <button class="experience-form__save"
        (click)="onSave()"
        [disabled]="isSaving || !formData.title || !formData.company">
        {{ isSaving ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </div>
</div>
