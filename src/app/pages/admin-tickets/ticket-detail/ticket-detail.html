<div class="ticket-detail" *ngIf="ticket">
  <div class="ticket-detail__card">
    <div class="ticket-detail__header">
      <span class="ticket-detail__id">T-{{ ticket.id }}</span>
      <span [ngClass]="statusClass(ticket.status)">{{ ticket.status }}</span>
    </div>

    <h3 class="ticket-detail__subject">{{ ticket.subject }}</h3>

    <div class="ticket-detail__grid">
      <div class="ticket-detail__field">
        <span class="ticket-detail__label">From</span>
        <span class="ticket-detail__value">{{ ticket.userName || ticket.userEmail }}</span>
      </div>
      <div class="ticket-detail__field">
        <span class="ticket-detail__label">Category</span>
        <span class="ticket-detail__value">{{ ticket.category }}</span>
      </div>
      <div class="ticket-detail__field">
        <span class="ticket-detail__label">Opened</span>
        <span class="ticket-detail__value">{{ ticket.createdAt | date:'MMM d' }}</span>
      </div>
      <div class="ticket-detail__field">
        <span class="ticket-detail__label">Update Status</span>
        <select class="ticket-detail__status-select" [(ngModel)]="selectedStatus" (change)="updateStatus()">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
        </select>
      </div>
    </div>

    <div class="ticket-detail__success" *ngIf="successMessage">
      ✅ {{ successMessage }}
    </div>
  </div>

  <div class="ticket-detail__message-card">
    <p class="ticket-detail__message">{{ ticket.description }}</p>

    <textarea
      class="ticket-detail__reply-input"
      placeholder="Write a reply..."
      [(ngModel)]="replyText"
    ></textarea>

    <button
      class="ticket-detail__send-btn"
      (click)="sendReply()"
      [disabled]="!replyText.trim()"
    >
      ➤ Send reply
    </button>
  </div>
</div>

<div class="ticket-detail__empty" *ngIf="!ticket">
  Select a ticket to view details
</div>
