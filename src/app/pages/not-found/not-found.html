<div class="flex flex-col min-h-screen">
  @if (isLoggedIn) {
    <app-navbar class="shrink-0"></app-navbar>
  }

  <div class="flex-1 flex flex-col items-center justify-center text-center gap-4 px-4">
    <h1 class="text-6xl font-bold" style="color: var(--copper); font-family: var(--font-display)">
      404
    </h1>
    <h2 class="text-2xl font-bold" style="color: var(--text); font-family: var(--font-display)">
      Page not found
    </h2>
    <p class="text-sm max-w-sm" style="color: var(--muted)">
      The page you're looking for doesn't exist or may have been moved.
    </p>

    <button
      type="button"
      (click)="goHome()"
      class="mt-2 px-6 py-3 rounded-xl text-sm font-semibold cursor-pointer"
      style="background: var(--teal); color: var(--white)"
    >
      {{ buttonLabel }}
    </button>
  </div>
</div>
